services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    command: ["php", "-S", "0.0.0.0:8000", "-t", "public", "public/index.php"]
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: 1
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stdin_open: true
    tty: true
    volumes:
      - ./:/app
      - composer-cache:/tmp/composer-cache
    dns:
      - 1.1.1.1
    ports:
      - "8000:8000"
    networks:
      - platform

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend/reviewer-ui
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 4173"]
    depends_on:
      app:
        condition: service_started
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      - frontend-node-modules:/workspace/frontend/reviewer-ui/node_modules
    dns:
      - 1.1.1.1
    ports:
      - "4173:4173"
    networks:
      - platform

  mongo:
    image: mongo:8.0.19-noble
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  composer-cache:
  frontend-node-modules:
  mongo-data:
